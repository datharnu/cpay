# CPay API on Render — stable webhook URL for Nomba
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cpay-api
    runtime: node
    rootDir: cpay-api
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # Free Neon Postgres connection string (durable storage on free Render).
      # Example: postgresql://user:pass@ep-xxx.region.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: SEED_SANDBOX_PARTNERS
        value: "true"
      - key: SKIP_WEBHOOK_SIGNATURE
        value: "true"
        # Sandbox fallback when NOMBA_WEBHOOK_SECRET is not set. Real Nomba webhooks still work.
      - key: CORS_ORIGIN
        value: http://localhost:3000
      - key: CORS_ALLOW_VERCEL
        value: "true"
      - key: NOMBA_BASE_URL
        value: https://api.nomba.com
      - key: NOMBA_ACCOUNT_ID
        sync: false
      - key: NOMBA_SUB_ACCOUNT_ID
        sync: false
      - key: NOMBA_CLIENT_ID
        sync: false
      - key: NOMBA_CLIENT_SECRET
        sync: false
      - key: NOMBA_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_URL
        value: https://cpay-api-j4j1.onrender.com/webhooks/nomba
